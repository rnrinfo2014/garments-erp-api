name: Main Branch Protection

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pylint flake8 black bandit
    
    - name: Code formatting check
      run: |
        black --check . || echo "Code formatting issues found - run 'black .' to fix"
    
    - name: Linting with pylint
      run: |
        pylint $(git ls-files '*.py') --exit-zero
    
    - name: Linting with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
    
    - name: Security check
      run: |
        bandit -r . -f json || echo "Security issues found - review bandit output"
    
    - name: Run tests
      run: |
        if [ -d "tests/" ]; then
          pytest tests/ -v
        else
          echo "No tests directory found - consider adding tests for better coverage"
        fi

  build-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Test Docker build
      run: |
        docker build -t garments-erp-api:test .
    
    - name: Test Docker compose configuration
      run: |
        docker-compose -f docker-compose.yml config
    
    - name: Check deployment scripts
      run: |
        if [ -f "deploy.sh" ]; then
          bash -n deploy.sh
        fi
        if [ -f "deploy.bat" ]; then
          echo "deploy.bat exists - Windows deployment script found"
        fi

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    - name: Check for known vulnerabilities
      run: |
        python -m pip install --upgrade pip
        pip install safety
        safety check -r requirements.txt || echo "Vulnerabilities found - review and update dependencies"
    
    - name: Check requirements files
      run: |
        python -m pip install --upgrade pip
        pip install pip-audit
        pip-audit --requirement requirements.txt || echo "Audit completed with findings"